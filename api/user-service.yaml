openapi: 3.0.3

info:
  title: User Service API
  description: Manages user accounts and authentication
  version: 1.0.0

servers:
  - url: /api/v1
    description: Via API Gateway

tags:
  - name: users
    description: User account management
  - name: auth
    description: Authentication and session management
  - name: features
    description: Runtime feature flag management
  - name: settings
    description: Runtime application settings management

paths:

  /users:
    get:
      tags: [users]
      summary: Get all users
      operationId: getAllUsers
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      tags: [users]
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      tags: [users]
      summary: Get a user by ID
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Matching user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [users]
      summary: Delete a user by ID
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User deleted successfully
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/signup:
    post:
      tags: [auth]
      summary: Register a new account
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      tags: [auth]
      summary: Log in with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/logout:
    post:
      tags: [auth]
      summary: Log out the current session
      operationId: logout
      responses:
        '204':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/me:
    get:
      tags: [auth]
      summary: Get the currently authenticated user
      operationId: getMe
      parameters:
        - name: X-User-Id
          in: header
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/logs:
    get:
      tags: [auth]
      summary: Get authentication event logs
      operationId: getLogs
      responses:
        '200':
          description: Authentication events
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuthEvent'
  
  /features:
    get:
      tags: [features]
      summary: Get all feature flags
      operationId: getAllFeatures
      responses:
        '200':
          description: List of feature flags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureFlag'

  /features/{name}:
    put:
      tags: [features]
      summary: Enable or disable a feature flag
      operationId: updateFeatureFlag
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - enabled
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Updated feature flag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlag'

        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '404':
          description: Feature flag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /settings:
    get:
      tags: [settings]
      summary: Get all application settings
      operationId: getAllSettings
      responses:
        '200':
          description: List of application settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppSetting'


  /settings/{name}:
    put:
      tags: [settings]
      summary: Update an application setting
      operationId: updateSetting
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - value
              properties:
                value:
                  type: string

      responses:
        '200':
          description: Updated application setting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppSetting'

        '400':
          description: Invalid setting value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '404':
          description: Setting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    User:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - USER
            - ADMIN
        name:
          type: string

    SignupRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - USER
            - ADMIN

    AuthEvent:
      type: object
      properties:
        timestamp:
          type: string
        type:
          type: string
        email:
          type: string
          format: email
        result:
          type: string
    
    FeatureFlag:
      type: object
      required:
        - name
        - enabled
        - description
      properties:
        name:
          type: string
        enabled:
          type: boolean
        description:
          type: string

    AppSetting:
      type: object
      required:
        - name
        - value
        - description
      properties:
        name:
          type: string
        value:
          type: string
        description:
          type: string

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string