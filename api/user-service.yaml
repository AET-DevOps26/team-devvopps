openapi: 3.0.3

info:
  title: User Service API
  description: Manages user accounts and authentication
  version: 1.0.0

servers:
  - url: /api/v1
    description: Via API Gateway

tags:
  - name: users
    description: User account management
  - name: auth
    description: Authentication and session management
  - name: features
    description: Runtime feature flag management
  - name: settings
    description: Runtime application settings management

paths:

  /users:
    get:
      tags: [user-controller]
      summary: Get all users
      operationId: getAllUsers
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      tags: [user-controller]
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      tags: [user-controller]
      summary: Get a user by ID
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/User'

    delete:
      tags: [user-controller]
      summary: Delete a user by ID
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK

  /auth/signup:
    post:
      tags: [auth-controller]
      summary: Register a new account
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      tags: [auth-controller]
      summary: Log in with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/logout:
    post:
      tags: [auth-controller]
      summary: Log out the current session
      operationId: logout
      responses:
        '200':
          description: OK

  /auth/me:
    get:
      tags: [auth-controller]
      summary: Get the currently authenticated user
      operationId: getMe
      parameters:
        - name: X-User-Id
          in: header
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/logs:
    get:
      tags: [auth-controller]
      summary: Get authentication event logs
      operationId: getLogs
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: '#/components/schemas/AuthEvent'

  /features:
    get:
      tags: [feature-controller]
      summary: Get all feature flags
      operationId: getAllFeatures
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureFlag'

  /features/{name}:
    put:
      tags: [feature-controller]
      summary: Enable or disable a feature flag
      operationId: updateFeatureFlag
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: boolean
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FeatureFlag'

  /settings:
    get:
      tags: [setting-controller]
      summary: Get all application settings
      operationId: getAllSettings
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppSetting'

  /settings/{name}:
    put:
      tags: [setting-controller]
      summary: Update an application setting
      operationId: updateSetting
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AppSetting'

components:
  schemas:
    User:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        email:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        name:
          type: string

    SignupRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        email:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]

    AuthEvent:
      type: object
      properties:
        timestamp:
          type: string
        type:
          type: string
        email:
          type: string
        result:
          type: string

    FeatureFlag:
      type: object
      properties:
        name:
          type: string
        enabled:
          type: boolean
        description:
          type: string

    AppSetting:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        description:
          type: string