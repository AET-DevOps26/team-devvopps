openapi: 3.0.3

info:
  title: Roadmap Service API
  description: Generates, retrieves and manages personalised learning roadmaps.
  version: 1.0.0

servers:
  - url: /api/v1
    description: Via API Gateway

tags:
  - name: roadmaps
    description: Roadmap management

paths:

  /roadmaps:
    get:
      tags: [roadmaps]
      summary: Get roadmaps for the authenticated user
      operationId: getRoadmaps
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of roadmaps belonging to the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Roadmap'

  /roadmaps/all:
    get:
      tags: [roadmaps]
      summary: Get all roadmaps (admin)
      operationId: getAllRoadmaps
      responses:
        '200':
          description: List of all roadmaps - admin only
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Roadmap'

  /roadmaps/generate:
    post:
      tags: [roadmaps]
      summary: Generate a roadmap
      operationId: generateRoadmap
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
        - name: goal
          in: query
          required: true
          schema:
            type: string
          description: Learning goal used for AI roadmap generation
      responses:
        '200':
          description: Generated roadmap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Roadmap'
        '404':
          description: User does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: LLM token quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: LLM returned invalid roadmap data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: LLM returned no usable roadmap milestones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
    /roadmaps/{roadmapId}/progress:
    get:
      tags: [roadmaps]
      summary: Get roadmap progress
      operationId: getRoadmapProgress
      parameters:
        - name: roadmapId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Progress information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapProgress'
        '404':
          description: Roadmap not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /roadmaps/{id}:
    get:
      tags: [roadmaps]
      summary: Get roadmap by ID
      operationId: getRoadmap
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Roadmap details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Roadmap'
        '404':
          description: Roadmap not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /roadmaps/{roadmapId}/tasks/{taskId}/complete:
    patch:
      tags: [roadmaps]
      summary: Toggle task completion
      operationId: toggleTaskCompletion
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
        - name: roadmapId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Updated roadmap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Roadmap'
        '404':
          description: Roadmap or task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    Roadmap:
      type: object
      required:
        - roadmap_id
        - user_id
        - title
        - goal
        - milestones
      properties:
        roadmap_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        title:
          type: string
        created_date:
          type: string
          format: date-time
        progress:
          type: integer
          example: 50
        goal:
          $ref: '#/components/schemas/Goal'
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'

    Goal:
      type: object
      properties:
        goal_id:
          type: integer
          format: int64
        description:
          type: string
        created_date:
          type: string
          format: date-time

    Milestone:
      type: object
      properties:
        milestone_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - NOT_STARTED
            - IN_PROGRESS
            - COMPLETED
        orderIndex:
          type: integer
        course_id:
          type: integer
          format: int64
          nullable: true
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'

    Task:
      type: object
      properties:
        task_id:
          type: integer
          format: int64
        title:
          type: string
        completed:
          type: boolean

    RoadmapProgress:
      type: object
      properties:
        completedMilestones:
          type: integer
        totalMilestones:
          type: integer
        completedTasks:
          type: integer
        totalTasks:
          type: integer
          format: int64
        roadmapCompleted:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string