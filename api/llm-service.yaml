openapi: 3.1.0
info:
  title: LLM Recommendation Service
  description: Service that generates personalized learning roadmaps using an LLM
  version: 2.0.0

servers:
  - url: /
    description: Direct internal service access

tags:
  - name: recommendations
    description: LLM-powered roadmap generation

paths:

  /:
    get:
      summary: Root
      description: Root endpoint with service information.
      operationId: root
      responses:
        '200':
          description: Successful Response - Service information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootResponse'

  /health:
    get:
      summary: Health Check
      description: Health check endpoint.
      operationId: healthCheck
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /usage:
    get:
      summary: Get Usage
      description: >
        Returns the caller's cumulative token usage and remaining quota.
        The user id comes from the gateway-injected, JWT-verified X-User-Id header,
        so the client cannot query another user's usage.
      operationId: getUsage
      parameters:
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful Response - Token usage information
          content:
              application/json:
                schema:
                  $ref: '#/components/schemas/UsageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /recommend:
    post:
      tags: [recommendations]
      summary: Recommend
      operationId: generateRecommendation
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            default: anonymous
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoadmapRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: User token limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: LLM backend unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /logs:
    get:
      summary: Get Logs
      operationId: getLogs
      responses:
        '200':
          description: Successful Response - Recent service logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsResponse'

components:
  schemas:

    RoadmapRequest:
      type: object
      description: Request schema for generate endpoint.
      required:
        - goal
      properties:
        goal:
          type: string
          description: The user's learning goal in natural language

    RoadmapResponse:
      type: object
      description: Response schema for generate endpoint.
      properties:
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
    
    Milestone:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'

    Task:
      type: object
      properties:
        title:
          type: string
        completed:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        detail:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ValidationError'

    ValidationError:
      type: object
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string
    
    UsageResponse:
      type: object
      properties:
        user_id:
          type: string
        used:
          type: integer
        limit:
          type: integer
        remaining:
          type: integer
        period:
          type: string
    
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        provider:
          type: string
        model:
          type: string
        api_key_configured:
          type: boolean
        courses_indexed:
          type: integer
    
    RootResponse:
      type: object
      properties:
        service:
          type: string
        version:
          type: string
        description:
          type: string
        endpoints:
          type: object
          additionalProperties:
            type: string
    
    LogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'


    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
        message:
          type: string
        goal:
          type: string
