openapi: 3.1.0
info:
  title: LLM Recommendation Service
  description: Service that generates personalized learning roadmaps using an LLM
  version: 2.0.0

servers:
  - url: /
    description: Direct internal service access

tags:
  - name: recommendations
    description: LLM-powered roadmap generation

paths:
  /:
    get:
      summary: Root
      description: Root endpoint with service information.
      operationId: root
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string

  /health:
    get:
      summary: Health Check
      description: >
        Health check endpoint, polled by Docker's healthcheck.
        Returns 503 while no courses are indexed so `docker compose ps` shows
        "unhealthy"/"starting" instead of "healthy" during the window where the
        process is up but roadmap generation would run without course context.
        Flips back to 200 automatically once a course fetch succeeds (either at
        startup or via the retry-on-request in /recommend).
        Not used as the Kubernetes readiness probe — see /livez for that.
      operationId: healthCheck
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string

  /livez:
    get:
      summary: Liveness Check
      description: >
        Kubernetes readiness probe target: process is up and serving HTTP.
        Deliberately independent of course-index state — see /health's docstring.
      operationId: livezCheck
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string

  /usage:
    get:
      summary: Get Usage
      description: >
        Returns the caller's cumulative token usage and remaining quota.
        The user id comes from the gateway-injected, JWT-verified X-User-Id header,
        so the client cannot query another user's usage.
      operationId: getUsage
      parameters:
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'

  /recommend:
    post:
      summary: Recommend
      operationId: generateRecommendation
      parameters:
        - name: x-user-id
          in: header
          required: false
          schema:
            type: string
            default: anonymous
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoadmapRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'

  /logs:
    get:
      summary: Get Logs
      operationId: getLogs
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string

components:
  schemas:
    RoadmapRequest:
      type: object
      description: Request schema for generate endpoint.
      required:
        - goal
      properties:
        goal:
          type: string
          description: The user's learning goal in natural language

    RoadmapResponse:
      type: object
      description: Response schema for generate endpoint.
      properties:
        milestones:
          type: array
          description: Learning milestones
          default: []
          items: {}

    ValidationError:
      type: object
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string

    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'