openapi: 3.1.0
info:
  title: LLM Recommendation Service
  description: Service that generates personalized learning roadmaps using an LLM
  version: 2.0.0

servers:
  - url: /
    description: Direct internal service access

tags:
  - name: recommendations
    description: LLM-powered roadmap generation

paths:

  /:
    get:
      summary: Root
      description: Root endpoint with service information.
      operationId: root
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string

  /health:
    get:
      summary: Health Check
      description: Health check endpoint.
      operationId: healthCheck
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string

  /usage:
    get:
      summary: Get Usage
      description: >
        Returns the caller's cumulative token usage and remaining quota.
        The user id comes from the gateway-injected, JWT-verified X-User-Id header,
        so the client cannot query another user's usage.
      operationId: getUsage
      parameters:
        - name: x-user-id
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'

  /recommend:
    post:
      tags: [recommendations]
      summary: Recommend
      operationId: generateRecommendation
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            default: anonymous
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoadmapRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '429':
          description: User token limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '503':
          description: LLM backend unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'

  /logs:
    get:
      summary: Get Logs
      operationId: getLogs
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: string

components:
  schemas:

    RoadmapRequest:
      type: object
      description: Request schema for generate endpoint.
      required:
        - goal
      properties:
        goal:
          type: string
          description: The user's learning goal in natural language

    RoadmapResponse:
      type: object
      description: Response schema for generate endpoint.
      properties:
        milestones:
          type: array
          items: {}

    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'

    ValidationError:
      type: object
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string