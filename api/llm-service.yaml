openapi: 3.0.3
info:
  title: LLM Service API
  description: LangChain-powered service that generates personalised roadmap recommendations based on user goals and available courses
  version: 1.0.0

servers:
  - url: /
    description: Direct internal service access

tags:
  - name: recommendations
    description: LLM-powered roadmap generation

paths:
  /recommend:
    post:
      tags: [recommendations]
      summary: Generate a roadmap recommendation
      operationId: generateRecommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoadmapRequest'
      responses:
        '200':
          description: Generated roadmap recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapResponse'
        '422':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: LLM backend unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: User token limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /usage/{user_id}:
    get:
      summary: Get user token usage
      operationId: getUsage
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Token usage information
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    format: int64
                  used:
                    type: integer
                  limit:
                    type: integer
                  remaining:
                    type: integer

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  schemas:
    RoadmapRequest:
      type: object
      required: 
        - goal
      properties:
        goal:
          type: string
          description: The user's learning goal in natural language
          maxLength: 200

    RoadmapResponse:
      type: object
      properties:
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'

    Milestone:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'

    Task:
      type: object
      properties:
        title:
          type: string
        completed:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: string
    
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        service:
          type: string
        model:
          type: string