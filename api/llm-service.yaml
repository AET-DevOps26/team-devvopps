openapi: 3.0.3
info:
  title: LLM Service API
  description: LangChain-powered service that generates personalised roadmap recommendations based on user goals and available courses
  version: 1.0.0

servers:
  - url: /
    description: Direct (called internally by roadmap-service, not exposed via API Gateway)

tags:
  - name: recommendations
    description: LLM-powered roadmap generation

paths:
  /recommend:
    post:
      tags: [recommendations]
      summary: Generate a roadmap recommendation
      operationId: generateRecommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendRequest'
      responses:
        '200':
          description: Generated roadmap recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendResponse'
        '422':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: LLM backend unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  model:
                    type: string
                    description: Currently active LLM backend

components:
  schemas:
    RoadmapRequest:
      type: object
      required: [goal, courses]
      properties:
        goal:
          type: string
          description: The user's learning goal in natural language

    RoadmapResponse:
      type: object
      properties:
        milestones:
          type: array
          items:
            type: string
        tasks:
          type: array
          items:
            type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: string