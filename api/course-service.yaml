openapi: 3.0.3
info:
  title: Course Service API
  description: Read-only TUM course database
  version: 1.0.0

servers:
  - url: /api/v1
    description: Via API Gateway

tags:
  - name: courses
    description: Course catalogue

paths:
  /courses:
    get:
      tags: [courses]
      summary: Get all courses
      operationId: getAllCourses
      responses:
        '200':
          description: List of all courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
  
  /courses/search:
    get:
      tags: [courses]
      summary: Search for a course by title
      operationId: searchCourses
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
          description: Full or partial course title (case-insensitive)
      responses:
        '200':
          description: Matching course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'

  /courses/{id}:
    get:
      tags: [courses]
      summary: Get a course by ID
      operationId: getCourse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Matching course
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '404':
          description: Course not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Course:
      type: object
      required:
        - course_id
        - title
        - tum_number
      properties:
        course_id:
          type: integer
          format: int64
          readOnly: true
          description: Unique database identifier

        title:
          type: string
          description: Course title

        content:
          type: string
          description: Detailed course content and description

        previous_knowledge:
          type: string
          description: Required prerequisites

        objective:
          type: string
          description: Learning objectives and expected outcomes

        teaching_method:
          type: string
          description: Teaching methods and approach

        registration:
          type: string
          description: Registration and enrollment information

        offered_in:
          type: string
          description: Semester(s) when the course is offered

        recommended_literature:
          type: string
          description: Recommended literature and further reading

        tum_number:
          type: string
          description: TUM course identifier

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string