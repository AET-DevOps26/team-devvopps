openapi: 3.0.3
info:
  title: Course Service API
  description: Read-only TUM course database
  version: 1.0.0

servers:
  - url: /api/v1
    description: Via API Gateway

tags:
  - name: courses
    description: Course catalogue

paths:
  /courses:
    get:
      tags: [courses]
      summary: Get all courses
      operationId: getAllCourses
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'

  /courses/search:
    get:
      tags: [courses]
      summary: Search for a course by title
      operationId: searchCourses
      parameters:
        - name: title
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Course'

  /courses/{id}:
    get:
      tags: [courses]
      summary: Get a course by ID
      operationId: getCourse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Course'

components:
  schemas:
    Course:
      type: object
      properties:
        course_id:
          type: integer
          format: int64
        title:
          type: string
        content:
          type: string
        previous_knowledge:
          type: string
        objective:
          type: string
        teaching_method:
          type: string
        registration:
          type: string
        offered_in:
          type: string
        recommended_literature:
          type: string
        tum_number:
          type: string