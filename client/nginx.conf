server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — route all paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the gateway (trailing slash strips the /api prefix).
    location /api/ {
        proxy_pass http://api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # LLM roadmap generation can take 2-3 minutes; nginx defaults to 60s,
        # which would cut the request off. Must exceed llm-service's own 300s
        # timeout so the backend's response/error reaches the client instead of
        # the proxy returning 504.
        proxy_read_timeout 330s;
        proxy_send_timeout 330s;
    }

    # Route LLM requests through the api-gateway (not directly to llm-service)
    # so they pass the gateway's JWT authentication. No trailing slash on
    # proxy_pass keeps the /llm prefix, which the gateway strips before
    # forwarding to llm-service.
    location /llm/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 330s;
        proxy_send_timeout 330s;
    }
}
