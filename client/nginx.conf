server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — tüm path'leri index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API isteklerini gateway'e proxy'le
    location /api/ {
        proxy_pass http://api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # LLM roadmap üretimi (Logos gpt-oss-120b) 2-3 dk sürebiliyor;
        # nginx varsayılanı 60 sn olduğundan istek yarıda kesilirdi.
        # llm-service'in kendi timeout'undan (300 sn) yüksek olmalı ki
        # backend cevabı/hatası iletilmeden proxy 504 atmasın.
        proxy_read_timeout 330s;
        proxy_send_timeout 330s;
    }

    # LLM servisini proxy'le
    location /llm/ {
        proxy_pass http://llm-service:8084/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
