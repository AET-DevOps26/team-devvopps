# Default values for team-devvopps Helm chart
# Used for all deployments (local, AET staging, production)
# Environment-specific values overridden by:
#   - values-aet.yaml (for AET cluster)
#   - values-secrets.yaml (for credentials, gitignored)

namespace: team-devvopps

# Image configuration
imageRegistry: team-devvopps
# imageTag: latest means always use the latest built image
imageTag: latest
# Always pull ensures replicas get fresh images even if already cached
imagePullPolicy: Always

# Replicas (High Availability)
# Top-level replicas kept for backward compatibility, but postgres uses postgres.replicas
replicas: 1

# Ingress configuration (empty = use NodePort for local dev)
ingressHost: ""

# PostgreSQL Configuration
# Implements Primary-Replica streaming replication for data safety
# - postgres-0 = Primary (accepts reads/writes, sends WAL to replicas)
# - postgres-1 = Replica (read-only, synced via streaming replication)
postgres:
  # Number of replicas: 2 = 1 primary + 1 replica (each gets separate storage)
  replicas: 2
  version: "16"
  image: postgres:16
  # Storage per pod (StatefulSet creates separate PVC for each: postgres-storage-postgres-0, postgres-storage-postgres-1)
  # Total storage used = 2 × storage value
  storage: 1Gi
  # Superuser credentials (overridden by values-secrets.yaml or --set)
  credentials:
    username: postgres
    password: postgres
  # Replication user credentials for primary-replica streaming replication
  # Limited permissions: can only stream WAL, cannot modify data
  replicationUser: replication
  replicationPassword: replication

# Service ports (should not change)
services:
  postgres:
    port: 5432
  userService:
    port: 8081
  courseService:
    port: 8082
  roadmapService:
    port: 8083
  apiGateway:
    port: 8080
  client:
    port: 80
  llmService:
    port: 8084

# LLM Service API keys (override in values-aet.yaml or via --set)
llmService:
  groqApiKey: ""
  logosApiKey: ""

# Prometheus Configuration
prometheus:
  retention: 15d
  scrapeInterval: 15s
  evaluationInterval: 15s
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

# Grafana Configuration
grafana:
  adminUser: admin
  adminPassword: admin
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 150m
      memory: 256Mi

# Loki Configuration (log aggregation, ephemeral emptyDir storage)
loki:
  image: grafana/loki:2.9.0
  retention: 168h
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 256Mi

# Promtail Configuration (log shipper, runs as DaemonSet on every node)
promtail:
  image: grafana/promtail:3.0.0
  # Log line format of the container runtime:
  #   cri    = containerd (AET cluster)
  #   docker = docker-desktop (values-local.yaml overrides to this)
  pipelineStage: cri
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

