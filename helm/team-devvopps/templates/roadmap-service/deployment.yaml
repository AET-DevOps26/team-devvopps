apiVersion: apps/v1
kind: Deployment
metadata:
  name: roadmap-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: roadmap-service
  template:
    metadata:
      labels:
        app: roadmap-service
        monitoring: "true"
    spec:
      # Disable legacy Docker-link env injection (USER_SERVICE_PORT=tcp://... etc.)
      # which collides with Spring relaxed binding of user.service.port properties.
      enableServiceLinks: false
      containers:
        - name: roadmap-service
          image: {{ .Values.imageRegistry }}/roadmap-service:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.roadmapService.port }}
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 350Mi
          env:
            - name: DB_HOST
              value: postgres-0.postgres
            - name: DB_NAME
              value: roadmapdb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: USER_SERVICE_HOST
              value: user-service
            - name: USER_SERVICE_PORT
              value: "{{ .Values.services.userService.port }}"
            - name: LLM_SERVICE_HOST
              value: llm-service
            - name: LLM_SERVICE_PORT
              value: "{{ .Values.services.llmService.port }}"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.services.roadmapService.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
