apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  # Main postgres superuser credentials
  # Used for initializing primary (initdb) and general admin tasks
  # Also used for pg_isready checks waiting for primary to be ready
  username: {{ .Values.postgres.credentials.username }}
  password: {{ .Values.postgres.credentials.password }}

  # Replication-only user credentials
  # Limited permissions: can only stream WAL, cannot modify data
  # Used by pg_basebackup on replica pods to clone primary and start streaming replication
  # Must match the role created in configmap.yaml init.sql
  replication-user: {{ .Values.postgres.replicationUser }}
  replication-password: {{ .Values.postgres.replicationPassword }}
