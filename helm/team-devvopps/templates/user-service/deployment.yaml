apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        monitoring: "true"
    spec:
      # Disable legacy Docker-link env injection (USER_SERVICE_PORT=tcp://... etc.)
      # which collides with Spring relaxed binding of user.service.port properties.
      enableServiceLinks: false
      containers:
        - name: user-service
          image: {{ .Values.imageRegistry }}/user-service:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.services.userService.port }}
          resources:
            requests:
              cpu: {{ .Values.services.userService.resources.requests.cpu }}
              memory: {{ .Values.services.userService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.services.userService.resources.limits.cpu }}
              memory: {{ .Values.services.userService.resources.limits.memory }}
          env:
            - name: DB_HOST
              value: postgres-0.postgres
            - name: DB_NAME
              value: userdb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            # Auth: JWT signing key (shared with api-gateway), cookie flag, and
            # optional admin bootstrap credentials.
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: jwt-signing-key
            - name: COOKIE_SECURE
              value: {{ .Values.auth.cookieSecure | quote }}
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: admin-email
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: admin-password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.services.userService.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
