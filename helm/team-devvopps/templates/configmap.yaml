apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: {{ .Values.namespace }}
data:
  init.sql: |
    -- Application databases
    CREATE DATABASE userdb;
    CREATE DATABASE coursedb;
    CREATE DATABASE roadmapdb;

    -- Create replication user (trust auth, no password required in cluster)
    CREATE ROLE {{ .Values.postgres.replicationUser }} LOGIN REPLICATION;

    -- Enable replication
    ALTER SYSTEM SET max_wal_senders = 10;
    ALTER SYSTEM SET max_replication_slots = 10;
    ALTER SYSTEM SET wal_level = replica;

  99-replication.sh: |
    #!/bin/bash
    # Add replication rule to pg_hba.conf (simple trust auth within cluster)
    echo "host replication all 0.0.0.0/0 trust" >> "$PGDATA/pg_hba.conf"
