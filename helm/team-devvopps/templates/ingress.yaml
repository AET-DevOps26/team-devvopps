{{- if .Values.ingressHost }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: team-devvopps-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Logos (gpt-oss-120b) roadmap generation takes 130-160s — keep these
    # above the llm-service timeout (300s) so the ingress doesn't 504 first.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingressHost }}
      secretName: team-devvopps-tls
  rules:
    - host: {{ .Values.ingressHost }}
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.services.apiGateway.port }}

          - path: /llm(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: llm-service
                port:
                  number: {{ .Values.services.llmService.port }}

          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: client
                port:
                  number: {{ .Values.services.client.port }}
{{- end }}
