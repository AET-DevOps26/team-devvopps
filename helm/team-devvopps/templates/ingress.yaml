{{- if .Values.ingressHost }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: team-devvopps-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Logos (gpt-oss-120b) roadmap generation takes 130-160s. Must stay
    # strictly ABOVE the llm-service request timeout (300s): its timer starts
    # earlier, so an equal value would 504 before the backend can respond.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "330"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "330"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingressHost }}
      secretName: team-devvopps-tls
  rules:
    - host: {{ .Values.ingressHost }}
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.services.apiGateway.port }}

          # llm-service intentionally has no rule of its own here — it must
          # only be reached through api-gateway's JWT check (/api/llm/**
          # above, or client's nginx proxying bare /llm/ to the gateway). A
          # direct rule to llm-service would bypass that auth entirely, the
          # way it used to — see FAIR_USE.md §3.

          # Grafana under /grafana — prefix is stripped by the rewrite, and
          # GF_SERVER_ROOT_URL makes Grafana generate prefixed URLs back.
          - path: /grafana(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: grafana
                port:
                  number: 3000

          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: client
                port:
                  number: {{ .Values.services.client.port }}
{{- end }}
