{{- if .Values.ingressHost }}
# API ingress — rewrites /api/foo → /foo and /llm/foo → /foo
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: team-devvopps-ingress-api
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingressHost }}
      secretName: team-devvopps-tls
  rules:
    - host: {{ .Values.ingressHost }}
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.services.apiGateway.port }}

          - path: /llm(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: llm-service
                port:
                  number: {{ .Values.services.llmService.port }}
---
# Frontend ingress — no rewrite, serves React SPA
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: team-devvopps-ingress-client
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingressHost }}
      secretName: team-devvopps-tls
  rules:
    - host: {{ .Values.ingressHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: {{ .Values.services.client.port }}
{{- end }}
