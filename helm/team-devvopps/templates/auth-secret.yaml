apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  # HS256 JWT signing key, shared by user-service (signs) and api-gateway (verifies).
  # `required` makes helm fail fast rather than deploy an unusable empty key.
  jwt-signing-key: {{ required "auth.jwtSigningKey must be set (use --set auth.jwtSigningKey=...)" .Values.auth.jwtSigningKey | quote }}
  # Optional admin bootstrap credentials (blank = user-service skips bootstrap).
  admin-email: {{ .Values.auth.adminEmail | quote }}
  admin-password: {{ .Values.auth.adminPassword | quote }}
