# Promtail runs as a DaemonSet: one pod per node, tailing that node's pod log
# files from /var/log/pods and pushing them to Loki.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: {{ .Values.namespace }}
spec:
  # The cluster has ~28 nodes; the default rolling update (maxUnavailable: 1)
  # replaces promtail pods nearly one node at a time, which blows past helm's
  # --wait timeout ("DaemonSet not ready: Updated: 11/28"). Promtail is a log
  # shipper — restarting half the fleet at once only delays log delivery
  # briefly, so trade availability for rollout speed.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 50%
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: promtail
          image: {{ .Values.promtail.image }}
          args:
            - '-config.file=/etc/promtail/promtail-config.yaml'
            - '-config.expand-env=true'
          ports:
            - containerPort: 9080
          env:
            # Promtail restricts kubernetes_sd discovery to pods on its own
            # node using $HOSTNAME as the node name. Without this, HOSTNAME
            # defaults to the pod's own name and discovery silently matches
            # zero pods.
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          # Runs as root — required to read /var/log/pods on the node.
          # Everything else is locked down: read-only rootfs, no privilege
          # escalation, all capabilities dropped.
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: {{ .Values.promtail.resources.requests.cpu }}
              memory: {{ .Values.promtail.resources.requests.memory }}
            limits:
              cpu: {{ .Values.promtail.resources.limits.cpu }}
              memory: {{ .Values.promtail.resources.limits.memory }}
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail
            - name: positions
              mountPath: /run/promtail
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            {{- if eq .Values.promtail.pipelineStage "docker" }}
            # docker-desktop only: files under /var/log/pods are symlinks
            # into /var/lib/docker/containers, so the symlink target needs
            # to be reachable too. Not mounted on AET (containerd) at all —
            # there's no such symlink there, so this hostPath mount would
            # just be unused attack surface.
            - name: docker-logs
              mountPath: /var/lib/docker/containers
              readOnly: true
            {{- end }}
          # timeoutSeconds raised from the 1s default: during a full cluster
          # rollout (kubectl rollout restart of every deployment at once),
          # promtail is busy tailing many log targets simultaneously and can
          # take longer than 1s to answer, causing false Unhealthy events
          # even though the process itself is fine.
          readinessProbe:
            httpGet:
              path: /ready
              port: 9080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: 9080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: promtail-config
          configMap:
            name: promtail-config
        - name: positions
          emptyDir: {}
        - name: pod-logs
          hostPath:
            path: /var/log/pods
        {{- if eq .Values.promtail.pipelineStage "docker" }}
        - name: docker-logs
          hostPath:
            path: /var/lib/docker/containers
        {{- end }}
