apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
        monitoring: "true"
    spec:
      # Disable legacy Docker-link env injection (USER_SERVICE_PORT=tcp://... etc.)
      # which collides with Spring relaxed binding of user.service.port properties.
      enableServiceLinks: false
      containers:
        - name: llm-service
          image: {{ .Values.imageRegistry }}/llm-service:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.services.llmService.port }}
          resources:
            requests:
              cpu: {{ .Values.services.llmService.resources.requests.cpu }}
              memory: {{ .Values.services.llmService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.services.llmService.resources.limits.cpu }}
              memory: {{ .Values.services.llmService.resources.limits.memory }}
          env:
            - name: COURSE_SERVICE_URL
              value: "http://course-service:{{ .Values.services.courseService.port }}/courses"
            - name: PORT
              value: "{{ .Values.services.llmService.port }}"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secret
                  key: groq-api-key
                  optional: true
            - name: LOGOS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-secret
                  key: logos-api-key
                  optional: true
          # /health intentionally stays 503 until courses are indexed (see its
          # docstring) — that's a soft "degraded mode" signal for dashboards,
          # not a hard readiness gate. Using it here would leave the pod
          # permanently NotReady if it ever loses the startup race with
          # course-service (most likely right after a fresh cluster install),
          # since nothing retries the course fetch except a live /recommend
          # call. /livez only confirms the process is up and serving HTTP.
          readinessProbe:
            httpGet:
              path: /livez
              port: {{ .Values.services.llmService.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
