apiVersion: batch/v1
kind: Job
metadata:
  name: course-seeder
  namespace: {{ .Values.namespace }}
  # Helm hook: the seeder is a one-off task, not a regular release resource.
  # - post-install/post-upgrade: helm runs it fresh AFTER each deploy instead
  #   of trying to patch the previous (immutable, completed) Job.
  # - before-hook-creation: helm deletes the old Job itself, so the manual
  #   "kubectl delete job" cleanup steps are no longer needed.
  # This also removes the --wait race where ttlSecondsAfterFinished deleted
  # the Job mid-wait and helm failed with "Job not ready: NotFound".
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres to be ready..."
              until pg_isready -h postgres -p 5432; do
                echo "  postgres not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "postgres is ready."
      containers:
        - name: seeder
          image: {{ .Values.imageRegistry }}/course-seeder:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          env:
            - name: DB_HOST
              value: postgres-0.postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: coursedb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
