apiVersion: batch/v1
kind: Job
metadata:
  name: course-seeder
  namespace: {{ .Values.namespace }}
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres to be ready..."
              until pg_isready -h postgres -p 5432; do
                echo "  postgres not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "postgres is ready."
      containers:
        - name: seeder
          image: {{ .Values.imageRegistry }}/course-seeder:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
          env:
            - name: DB_HOST
              value: postgres-0.postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: coursedb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
