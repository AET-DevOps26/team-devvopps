apiVersion: batch/v1
kind: Job
metadata:
  name: course-seeder
  namespace: {{ .Values.namespace }}
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-table
          image: {{ .Values.postgres.image }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for courses table to be created by course-service..."
              until psql -h postgres -U postgres -d coursedb -c "SELECT 1 FROM courses LIMIT 1" > /dev/null 2>&1; do
                echo "  courses table not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "courses table is ready."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
      containers:
        - name: seeder
          image: {{ .Values.imageRegistry }}/course-seeder:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: coursedb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
