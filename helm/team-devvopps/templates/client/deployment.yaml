apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      # Disable legacy Docker-link env injection (USER_SERVICE_PORT=tcp://... etc.)
      # which collides with Spring relaxed binding of user.service.port properties.
      enableServiceLinks: false
      # nginx's master process normally chowns its cache/run dirs to uid 101
      # (the image's nginx user) as root before dropping privileges. With ALL
      # capabilities dropped it can't chown, so we run as 101 from the start
      # and fsGroup makes the emptyDir mounts writable by that uid instead.
      securityContext:
        fsGroup: 101
      containers:
        - name: client
          image: {{ .Values.imageRegistry }}/client:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.services.client.port }}
          resources:
            requests:
              cpu: {{ .Values.services.client.resources.requests.cpu }}
              memory: {{ .Values.services.client.resources.requests.memory }}
            limits:
              cpu: {{ .Values.services.client.resources.limits.cpu }}
              memory: {{ .Values.services.client.resources.limits.memory }}
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
