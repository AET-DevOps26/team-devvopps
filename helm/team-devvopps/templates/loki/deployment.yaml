apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      # Loki's official image runs as user 10001; explicit here to satisfy
      # non-root policies on the shared AET cluster.
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
      containers:
        - name: loki
          image: {{ .Values.loki.image }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - '-config.file=/etc/loki/loki-config.yaml'
          ports:
            - containerPort: 3100
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.loki.resources.requests.cpu }}
              memory: {{ .Values.loki.resources.requests.memory }}
            limits:
              cpu: {{ .Values.loki.resources.limits.cpu }}
              memory: {{ .Values.loki.resources.limits.memory }}
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
            - name: loki-storage
              mountPath: /loki
      volumes:
        - name: loki-config
          configMap:
            name: loki-config
        # emptyDir = ephemeral: log history is lost when the pod restarts.
        # Acceptable for now; switch to a PVC if persistent logs are needed.
        - name: loki-storage
          emptyDir: {}
