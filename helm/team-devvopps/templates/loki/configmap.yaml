# Loki configuration — port of infra/loki/loki-config.yaml for Kubernetes.
# Single-instance, filesystem storage on emptyDir (ephemeral: logs are lost on pod restart).
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ .Values.namespace }}
data:
  loki-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    # Ingester: receives logs from Promtail and stores in memory before flushing to disk
    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory  # Single instance - no cluster coordination needed
          replication_factor: 1
        final_sleep: 0s

      chunk_idle_period: 5m
      chunk_retain_period: 30s

      # Write-Ahead Log: survives process crashes (but not pod restarts — emptyDir)
      wal:
        enabled: true
        dir: /loki/wal

    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/boltdb-shipper-active
        cache_location: /loki/boltdb-shipper-cache
        shared_store: filesystem

      filesystem:
        directory: /loki/chunks

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: {{ .Values.loki.retention }}
      retention_period: {{ .Values.loki.retention }}

    compactor:
      working_directory: /loki/boltdb-shipper-compactor
      shared_store: filesystem
      # Actually delete chunks older than retention_period (compose config only rejected ingestion)
      retention_enabled: true
