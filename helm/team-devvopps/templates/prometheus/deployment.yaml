apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
spec:
  # Run exactly 1 Prometheus instance (single replica for simplicity)
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      # Doesn't call the Kubernetes API (static scrape targets, no
      # kubernetes_sd_configs), so no need for its own service account
      # token to be mounted into the pod.
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          # Use specific version for reproducibility (not 'latest')
          image: prom/prometheus:v2.52.0@sha256:5c435642ca4d8427ca26f4901c11114023004709037880cd7860d5b7176aa731
          securityContext:
            # The official image already runs as uid 65534 (nobody) by
            # default; making it explicit here so Kubernetes/scanners can
            # verify it instead of assuming the image's default applies.
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            # Prometheus HTTP API and web UI on port 9090
            - containerPort: 9090
          resources:
            # Minimum CPU/memory guaranteed by Kubernetes scheduler
            requests:
              cpu: {{ .Values.prometheus.resources.requests.cpu }}
              memory: {{ .Values.prometheus.resources.requests.memory }}
            # Maximum resources this pod can consume
            limits:
              cpu: {{ .Values.prometheus.resources.limits.cpu }}
              memory: {{ .Values.prometheus.resources.limits.memory }}
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-alerts
              mountPath: /etc/prometheus/alerts
            - name: prometheus-storage
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15
          # Arguments passed to Prometheus binary at startup
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
      volumes:
        # Volume 1: Configuration file from ConfigMap (prometheus.yml)
        - name: prometheus-config
          configMap:
            name: prometheus-config
        # Volume 2: Alert rules from ConfigMap (alerts.yaml)
        - name: prometheus-alerts
          configMap:
            name: prometheus-alerts
        # Volume 3: Temporary storage for metrics (emptyDir = ephemeral, cleared on pod restart)
        # For production, replace with PersistentVolume to keep metrics across restarts
        - name: prometheus-storage
          emptyDir: {}
