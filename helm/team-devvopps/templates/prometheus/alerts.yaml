apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: {{ .Values.namespace }}
data:
  alerts.yaml: |
    groups:
      - name: team-devvopps
        interval: 30s
        rules:
          # Service downtime alert
          - alert: ServiceDown
            expr: up{job=~"user-service|course-service|roadmap-service|api-gateway"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "Service {{ $labels.job }} has been unavailable for more than 1 minute"

          # High error rate alert
          - alert: HighErrorRate
            expr: |
              (
                sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
                /
                sum(rate(http_requests_total[5m])) by (job)
              ) > 0.05
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High error rate on {{ $labels.job }}"
              description: "Error rate is above 5% for {{ $labels.job }}"

          # High latency alert
          - alert: HighLatency
            expr: |
              histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)) > 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High latency on {{ $labels.job }}"
              description: "p95 latency is above 1s for {{ $labels.job }}"
