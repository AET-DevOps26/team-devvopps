apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
spec:
  # NodePort = accessible externally on port 30090 across all cluster nodes
  # For presentations: tutors can access directly at http://localhost:30090
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
