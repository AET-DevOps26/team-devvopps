apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
spec:
  # ClusterIP = accessible only within the cluster (no external access)
  # Use kubectl port-forward for external access: kubectl port-forward -n team-devvopps svc/prometheus 9090:9090
  # Then access at http://localhost:9090
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
