apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      # Disable legacy Docker-link env injection (USER_SERVICE_PORT=tcp://... etc.)
      # which collides with Spring relaxed binding of user.service.port properties.
      enableServiceLinks: false
      containers:
        - name: api-gateway
          image: {{ .Values.imageRegistry }}/api-gateway:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.apiGateway.port }}
          resources:
            requests:
              cpu: {{ .Values.services.apiGateway.resources.requests.cpu }}
              memory: {{ .Values.services.apiGateway.resources.requests.memory }}
            limits:
              cpu: {{ .Values.services.apiGateway.resources.limits.cpu }}
              memory: {{ .Values.services.apiGateway.resources.limits.memory }}
          env:
            - name: USER_SERVICE_HOST
              value: user-service
            - name: COURSE_SERVICE_HOST
              value: course-service
            - name: ROADMAP_SERVICE_HOST
              value: roadmap-service
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.services.apiGateway.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
