apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
spec:
  # NodePort = accessible externally on port 30001 across all cluster nodes
  # For presentations: tutors can access directly at http://localhost:30001
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
