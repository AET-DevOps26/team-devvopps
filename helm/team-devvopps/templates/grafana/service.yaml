apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
spec:
  # ClusterIP = accessible only within the cluster (no external access)
  # Other services can reach Grafana at: http://grafana:3000 (Kubernetes DNS)
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - port: 3000
      # Forward traffic to pod's containerPort 3000
      targetPort: 3000
