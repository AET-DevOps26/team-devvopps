# ConfigMap containing Grafana dashboard provisioning config and dashboard JSON files
# Mounted to /etc/grafana/provisioning/dashboards so Grafana auto-loads on startup
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-content
  namespace: {{ .Values.namespace }}
data:
  # Provisioning config telling Grafana where to find dashboard JSON files
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "team-devvopps-dashboards"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        options:
          # Must match the mount path in deployment.yaml
          path: /etc/grafana/provisioning/dashboards
binaryData:
  # Dashboard JSON files (base64-encoded from helm chart)
  request-metrics.json: {{ .Files.Get "grafana-dashboards/dashboard-request-metrics.json" | b64enc }}
  system-health.json: {{ .Files.Get "grafana-dashboards/dashboard-system-health.json" | b64enc }}
  logs.json: {{ .Files.Get "grafana-dashboards/dashboard-logs.json" | b64enc }}
  auth.json: {{ .Files.Get "grafana-dashboards/dashboard-auth.json" | b64enc }}
