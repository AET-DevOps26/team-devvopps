apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
spec:
  # Run exactly 1 Grafana instance (single replica)
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      # Security context for Grafana container
      # fsGroup: 472 ensures the mounted PVC is writable by Grafana (UID 472)
      # Without this, Grafana crashes with "is not writable" permission errors
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.3
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          # Environment variables configure Grafana behavior
          env:
            # Admin password from Kubernetes Secret (not hard-coded)
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin-password
            # Admin username from Kubernetes Secret (not hard-coded)
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin-user
            # Disable self-registration (only admin can create accounts)
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          # Mount configuration and data volumes
          volumeMounts:
            # Grafana user data (dashboards, alerts, preferences)
            # emptyDir = ephemeral storage, lost on pod restart
            - name: grafana-storage
              mountPath: /var/lib/grafana
            # Auto-provision Prometheus datasource on startup
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            # Dashboard provisioning config and dashboard JSON files (auto-loaded on startup)
            - name: grafana-dashboards-content
              mountPath: /etc/grafana/provisioning/dashboards
      # Define volumes referenced above
      volumes:
        # Volume 1: Persistent storage for Grafana data (survives pod restarts)
        # PersistentVolumeClaim automatically creates/manages storage in the cluster
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-storage-pvc
        # Volume 2: Datasource provisioning config from ConfigMap
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        # Volume 3: Dashboard provisioning config and dashboard JSON files from ConfigMap
        - name: grafana-dashboards-content
          configMap:
            name: grafana-dashboards-content
