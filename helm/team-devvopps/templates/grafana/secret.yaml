apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-secret
  namespace: {{ .Values.namespace }}
type: Opaque
data:
  # Retrieved from: values.yaml grafana.adminUser or --set grafana.adminUser=xxx
  admin-user: {{ .Values.grafana.adminUser | b64enc | quote }}
  # Retrieved from: values-secrets.yaml or GitHub Actions --set grafana.adminPassword=xxx
  admin-password: {{ .Values.grafana.adminPassword | b64enc | quote }}
