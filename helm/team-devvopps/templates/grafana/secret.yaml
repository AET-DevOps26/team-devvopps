apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-secret
  namespace: {{ .Values.namespace }}
type: Opaque
data:
  # Retrieved from: values.yaml grafana.adminUser or --set grafana.adminUser=xxx
  # `required` makes helm fail fast instead of deploying with a blank admin username.
  admin-user: {{ required "grafana.adminUser must be set (use --set grafana.adminUser=...)" .Values.grafana.adminUser | b64enc | quote }}
  # Retrieved from: --set grafana.adminPassword=xxx (make helm-install-aet or GitHub Actions)
  # `required` makes helm fail fast instead of deploying with an empty password
  # (values-aet.yaml intentionally sets "" so manual deploys must pass --set).
  admin-password: {{ required "grafana.adminPassword must be set (use --set grafana.adminPassword=...)" .Values.grafana.adminPassword | b64enc | quote }}
