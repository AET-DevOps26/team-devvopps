apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: team-devvopps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      # Disable legacy Docker-link env injection (USER_SERVICE_PORT=tcp://... etc.)
      enableServiceLinks: false
      containers:
        - name: api-gateway
          image: team-devvopps/api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: USER_SERVICE_HOST
              value: user-service
            - name: COURSE_SERVICE_HOST
              value: course-service
            - name: ROADMAP_SERVICE_HOST
              value: roadmap-service
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
