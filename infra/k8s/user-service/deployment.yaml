apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: team-devvopps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        monitoring: "true"
    spec:
      # Disable legacy Docker-link env injection (USER_SERVICE_PORT=tcp://... etc.)
      enableServiceLinks: false
      containers:
        - name: user-service
          image: team-devvopps/user-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              value: userdb
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
