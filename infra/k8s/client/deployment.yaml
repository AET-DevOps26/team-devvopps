apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: team-devvopps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      # Disable legacy Docker-link env injection (USER_SERVICE_PORT=tcp://... etc.)
      enableServiceLinks: false
      containers:
        - name: client
          image: team-devvopps/client:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
