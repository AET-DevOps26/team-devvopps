services:

  # ── Database ──────────────────────────────────────────────────────────────
  # PostgreSQL database server initializes three schemas via init-databases.sql. Data persists in postgres_data volume.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../server/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Course Data Seeder ────────────────────────────────────────────────────
  # One-time job that populates the coursedb with initial course data.
  # Runs immediately after postgres is healthy. Exits after seeding completes.
  course-seeder:
    build:
      context: ../server/course-service
      dockerfile: Dockerfile.seeder
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: coursedb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── Wait for Courses ───────────────────────────────────────────────────────
  # Polling service that blocks until coursedb has at least one course.
  # Needed because other services may depend on courses being seeded before
  # they initialize (e.g., llm-service reads courses during startup).
  # Polls every 5s, times out after 360s (6 minutes).
  wait-for-courses:
    image: postgres:16
    environment:
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
      course-seeder:
        condition: service_started
    entrypoint: sh -c "while ! psql -h postgres -U postgres -d coursedb -c 'SELECT COUNT(*) FROM courses WHERE course_id > 0' 2>/dev/null | grep -q '[1-9]'; do sleep 5; done; echo 'Courses ready'; sleep infinity"
    healthcheck:
      test: ["CMD", "sh", "-c", "psql -h postgres -U postgres -d coursedb -c 'SELECT COUNT(*) FROM courses WHERE course_id > 0' 2>/dev/null | grep -q '[1-9]'"]
      interval: 5s
      timeout: 5s
      retries: 1
      start_period: 360s

  # ── Spring Boot Services ──────────────────────────────────────────────────

  user-service:
    build:
      context: ../server
      dockerfile: user-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: userdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  course-service:
    build:
      context: ../server
      dockerfile: course-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: coursedb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  # Roadmap service: generates learning roadmaps using the LLM.
  roadmap-service:
    build:
      context: ../server
      dockerfile: roadmap-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: roadmapdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      USER_SERVICE_HOST: user-service
      LLM_SERVICE_HOST: llm-service
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../server
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_HOST: user-service
      COURSE_SERVICE_HOST: course-service
      ROADMAP_SERVICE_HOST: roadmap-service
    depends_on:
      - user-service
      - course-service
      - roadmap-service

  # ── React Frontend ────────────────────────────────────────────────────────
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
      - llm-service

  # ── LLM Service ────────────────────────────────────────────────────────────
  # LLM inference service for generating personalized roadmaps.
  # Can use local LM Studio, Groq API, or TUM Logos (see env var priority).
  # Exposes: http://llm-service:8084 (internal), http://localhost:8084 (external)
  llm-service:
    build:
      context: ../server/llm-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      wait-for-courses:
        condition: service_healthy
    environment:
      # LM Studio on the host machine. host.docker.internal works on
      # Docker Desktop (macOS/Windows) out of the box; extra_hosts below
      # extends the same name to Linux hosts.
      - PORT=8084
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:1234/v1/chat/completions}
      - LLM_MODEL=${LLM_MODEL:-gemma-4-e2b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # Provider precedence (mirrors main.py logic):
      #   1. LOGOS_API_KEY set → TUM Logos (openai/gpt-oss-120b)
      #   2. GROQ_API_KEY set → Groq (llama-3.3-70b-versatile)
      #   3. Neither set → LM Studio (LLM_API_URL above)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LOGOS_API_KEY=${LOGOS_API_KEY:-}
      - COURSE_SERVICE_HOST=course-service
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
