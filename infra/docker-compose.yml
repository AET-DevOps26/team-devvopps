services:

  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../server/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Spring Boot Services ──────────────────────────────────────────────────
  user-service:
    build:
      context: ../server
      dockerfile: user-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: userdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  course-service:
    build:
      context: ../server
      dockerfile: course-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: coursedb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  roadmap-service:
    build:
      context: ../server
      dockerfile: roadmap-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: roadmapdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: "8081"        
      LLM_SERVICE_HOST: llm-service
      LLM_SERVICE_PORT: "8004"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../server
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: "8081"        
      COURSE_SERVICE_HOST: course-service
      COURSE_SERVICE_PORT: "8082"      
      ROADMAP_SERVICE_HOST: roadmap-service
      ROADMAP_SERVICE_PORT: "8083"
    depends_on:
      - user-service
      - course-service
      - roadmap-service

  # ── React Frontend ────────────────────────────────────────────────────────
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  # ── LLM Service ────────────────────────────────────────────────────────────
  llm-service:
    image: ghcr.io/aet-devops26/w06-template/llm:latest
    build:
      context: ../server
      dockerfile: llm-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      # LM Studio on the host machine. host.docker.internal works on
      # Docker Desktop (macOS/Windows) out of the box; extra_hosts below
      # extends the same name to Linux hosts.
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:1234/v1/chat/completions}
      - LLM_MODEL=${LLM_MODEL:-gemma-4-e2b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # Set LOGOS_API_KEY in .env to switch to the TUM-hosted Logos
      # endpoint (openai/gpt-oss-120b). When set, it overrides the
      # LM Studio defaults above. Unset = LM Studio.
      - LOGOS_API_KEY=${LOGOS_API_KEY:-}
      - COURSE_SERVICE_HOST: course-service
      - COURSE_SERVICE_PORT: "8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
