services:

  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../server/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Spring Boot Services ──────────────────────────────────────────────────
  user-service:
    build:
      context: ../server
      dockerfile: user-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: userdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  course-service:
    build:
      context: ../server
      dockerfile: course-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: coursedb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  roadmap-service:
    build:
      context: ../server
      dockerfile: roadmap-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: roadmapdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      USER_SERVICE_HOST: user-service
      LLM_SERVICE_HOST: llm-service
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../server
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_HOST: user-service
      COURSE_SERVICE_HOST: course-service
      ROADMAP_SERVICE_HOST: roadmap-service
    depends_on:
      - user-service
      - course-service
      - roadmap-service

  # ── React Frontend ────────────────────────────────────────────────────────
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
      - llm-service

# ── LLM Service ────────────────────────────────────────────────────────────
  llm-service:
    build:
      context: ../server/llm-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    depends_on:
      - postgres
    environment:
      # LM Studio on the host machine. host.docker.internal works on
      # Docker Desktop (macOS/Windows) out of the box; extra_hosts below
      # extends the same name to Linux hosts.
      - PORT=8084
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:1234/v1/chat/completions}
      - LLM_MODEL=${LLM_MODEL:-gemma-4-e2b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # Provider precedence (mirrors main.py logic):
      #   1. GROQ_API_KEY set → Groq (llama-3.3-70b-versatile)
      #   2. LOGOS_API_KEY set → TUM Logos (openai/gpt-oss-120b)
      #   3. Neither set → LM Studio (LLM_API_URL above)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LOGOS_API_KEY=${LOGOS_API_KEY:-}
      - COURSE_SERVICE_HOST=course-service
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Monitoring ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yaml:/etc/prometheus/alerts.yaml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - user-service
      - course-service
      - roadmap-service
      - api-gateway

  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources/prometheus.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml
      - ./grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ../helm/team-devvopps/grafana-dashboards/dashboard-request-metrics.json:/etc/grafana/provisioning/dashboards/request-metrics.json
      - ../helm/team-devvopps/grafana-dashboards/dashboard-system-health.json:/etc/grafana/provisioning/dashboards/system-health.json
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
