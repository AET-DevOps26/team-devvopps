services:

  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../server/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Spring Boot Services ──────────────────────────────────────────────────
  user-service:
    build:
      context: ../server
      dockerfile: user-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: userdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  course-service:
    build:
      context: ../server
      dockerfile: course-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: coursedb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  roadmap-service:
    build:
      context: ../server
      dockerfile: roadmap-service/Dockerfile
    environment:
      DB_HOST: postgres
      DB_NAME: roadmapdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      USER_SERVICE_HOST: user-service
      LLM_SERVICE_HOST: llm-service
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../server
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_HOST: user-service
      COURSE_SERVICE_HOST: course-service
      ROADMAP_SERVICE_HOST: roadmap-service
    depends_on:
      - user-service
      - course-service
      - roadmap-service

  # ── React Frontend ────────────────────────────────────────────────────────
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
      - llm-service

  # ── LLM Service ────────────────────────────────────────────────────────────
  llm-service:
    image: ghcr.io/aet-devops26/w06-template/llm:latest
    build:
      context: ../server
      dockerfile: llm-service/Dockerfile
    ports:
      - "8084:8004"
    environment:
      # LM Studio on the host machine. host.docker.internal works on
      # Docker Desktop (macOS/Windows) out of the box; extra_hosts below
      # extends the same name to Linux hosts.
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:1234/v1/chat/completions}
      - LLM_MODEL=${LLM_MODEL:-gemma-4-e2b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # Provider precedence (mirrors main.py logic):
      #   1. GROQ_API_KEY set → Groq (llama-3.3-70b-versatile)
      #   2. LOGOS_API_KEY set → TUM Logos (openai/gpt-oss-120b)
      #   3. Neither set → LM Studio (LLM_API_URL above)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LOGOS_API_KEY=${LOGOS_API_KEY:-}
      - COURSE_SERVICE_HOST=course-service
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
