services:

  # ── Database ──────────────────────────────────────────────────────────────
  # PostgreSQL database server initializes three schemas via init-databases.sql. Data persists in postgres_data volume.
  postgres:
    image: postgres:16
    security_opt:
      - no-new-privileges:true
    # Can't cap_drop ALL here: the official entrypoint chowns/chmods the
    # data dir as root on first init (fresh named volume starts root-owned,
    # and compose has no fsGroup equivalent to pre-seed ownership like the
    # Helm chart's postgres StatefulSet does). Drop everything except the
    # handful of capabilities that startup step actually needs.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in infra/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../server/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Course Data Seeder ────────────────────────────────────────────────────
  # One-time job that populates the coursedb with initial course data.
  # Waits for course-service to create the `courses` table (via Hibernate
  # ddl-auto) before inserting, since course-service owns the schema and
  # nothing here guarantees it starts before the seeder otherwise.
  course-seeder:
    build:
      context: ../server/course-service
      dockerfile: Dockerfile.seeder
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: coursedb
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in infra/.env}
    depends_on:
      postgres:
        condition: service_healthy
      course-service:
        condition: service_healthy
    restart: on-failure

  # ── Wait for Courses ───────────────────────────────────────────────────────
  # Polling service that blocks until coursedb has at least one course.
  # Needed because other services may depend on courses being seeded before
  # they initialize (e.g., llm-service reads courses during startup).
  # Polls every 5s, times out after 360s (6 minutes).
  wait-for-courses:
    image: postgres:16
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in infra/.env}
    depends_on:
      postgres:
        condition: service_healthy
      course-seeder:
        condition: service_started
    # -tAc: tuples-only, unaligned output — just the bare count (e.g. "0" or
    # "1196"), not psql's default table with a "(1 row)" footer. That footer
    # always contains a "1", so a plain `grep -q '[1-9]'` on aligned output
    # matches even when the count is genuinely 0.
    entrypoint: sh -c "while [ \"$$(psql -h postgres -U postgres -d coursedb -tAc 'SELECT COUNT(*) FROM courses WHERE course_id > 0' 2>/dev/null)\" = '0' ]; do sleep 5; done; echo 'Courses ready'; sleep infinity"
    healthcheck:
      test: ["CMD", "sh", "-c", "test \"$(psql -h postgres -U postgres -d coursedb -tAc 'SELECT COUNT(*) FROM courses WHERE course_id > 0' 2>/dev/null)\" != '0'"]
      interval: 5s
      timeout: 5s
      retries: 1
      start_period: 360s

  # ── Spring Boot Services ──────────────────────────────────────────────────

  user-service:
    build:
      context: ../server
      dockerfile: user-service/Dockerfile
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      DB_HOST: postgres
      DB_NAME: userdb
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in infra/.env}
      # Auth: signing key must match api-gateway's. Admin account is
      # bootstrapped from infra/.env on startup (blank = skip bootstrap).
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-only-insecure-key-change-me-0123456789}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    # No curl/wget in the eclipse-temurin base image; use bash's /dev/tcp to
    # hit actuator health directly (same pattern as course-service below).
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8081 && printf 'GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  course-service:
    build:
      context: ../server
      dockerfile: course-service/Dockerfile
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      DB_HOST: postgres
      DB_NAME: coursedb
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in infra/.env}
    depends_on:
      postgres:
        condition: service_healthy
    # No curl/wget in the eclipse-temurin base image; use bash's /dev/tcp to
    # hit actuator health directly. Healthy only once Hibernate has finished
    # ddl-auto (i.e. the `courses` table exists) and the app is serving.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8082 && printf 'GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 90s

  # Roadmap service: generates learning roadmaps using the LLM.
  roadmap-service:
    build:
      context: ../server
      dockerfile: roadmap-service/Dockerfile
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:8083:8083"
    environment:
      DB_HOST: postgres
      DB_NAME: roadmapdb
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in infra/.env}
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: "8081"        
      LLM_SERVICE_HOST: llm-service
      LLM_SERVICE_PORT: "8084"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8083 && printf 'GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../server
      dockerfile: api-gateway/Dockerfile
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: "8081"        
      COURSE_SERVICE_HOST: course-service
      COURSE_SERVICE_PORT: "8082"      
      ROADMAP_SERVICE_HOST: roadmap-service
      ROADMAP_SERVICE_PORT: "8083"
      # Without this the gateway falls back to localhost:8084 and /llm/*
      # proxying (token badge, admin logs) fails with connection refused.
      LLM_SERVICE_HOST: llm-service
      LLM_SERVICE_PORT: "8084"
      # Must match user-service's JWT_SIGNING_KEY (verifies what it signs).
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-only-insecure-key-change-me-0123456789}
    depends_on:
      user-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
      roadmap-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /actuator/health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── React Frontend ────────────────────────────────────────────────────────
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    security_opt:
      - no-new-privileges:true
    # nginx's master process chowns /var/cache/nginx etc. to uid 101 as root
    # on startup; can't cap_drop ALL without that failing ("Operation not
    # permitted"). Drop everything except what that one startup step needs.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api-gateway
      - llm-service
    healthcheck:
      # 127.0.0.1, not localhost: this Alpine image's resolver tries ::1
      # first and nginx isn't listening there the same way, so
      # "localhost" gets connection refused even though the app works.
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:80/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

# ── LLM Service ────────────────────────────────────────────────────────────
  # LLM inference service for generating personalized roadmaps.
  # Can use local LM Studio, Groq API, or TUM Logos (see env var priority).
  # Exposes: http://llm-service:8084 (internal), http://localhost:8084 (external)
  llm-service:
    build:
      context: ../server/llm-service
      dockerfile: Dockerfile
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      wait-for-courses:
        condition: service_healthy
    environment:
      # LM Studio on the host machine. host.docker.internal works on
      # Docker Desktop (macOS/Windows) out of the box; extra_hosts below
      # extends the same name to Linux hosts.
      - PORT=8084
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:1234/v1/chat/completions}
      - LLM_MODEL=${LLM_MODEL:-gemma-4-e2b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # Provider precedence (mirrors main.py logic):
      #   1. LOGOS_API_KEY set → TUM Logos (openai/gpt-oss-120b)
      #   2. GROQ_API_KEY set → Groq (llama-3.3-70b-versatile)
      #   3. Neither set → LM Studio (LLM_API_URL above)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LOGOS_API_KEY=${LOGOS_API_KEY:-}
      - COURSE_SERVICE_HOST=course-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # The distroless final image has no shell/curl/wget, only the venv's
    # python3 (also used as the container's entrypoint). urllib is stdlib,
    # so no extra dependency needed for the health check itself.
    healthcheck:
      test: ["CMD", "/venv/bin/python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8084/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Monitoring ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yaml:/etc/prometheus/alerts.yaml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - user-service
      - course-service
      - roadmap-service
      - api-gateway
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  grafana:
    image: grafana/grafana:10.2.3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in infra/.env}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ../helm/team-devvopps/grafana-dashboards/dashboard-request-metrics.json:/etc/grafana/provisioning/dashboards/request-metrics.json
      - ../helm/team-devvopps/grafana-dashboards/dashboard-system-health.json:/etc/grafana/provisioning/dashboards/system-health.json
      - ../helm/team-devvopps/grafana-dashboards/dashboard-logs.json:/etc/grafana/provisioning/dashboards/logs.json
      - ../helm/team-devvopps/grafana-dashboards/dashboard-auth.json:/etc/grafana/provisioning/dashboards/auth.json
      - ../helm/team-devvopps/grafana-dashboards/dashboard-llm.json:/etc/grafana/provisioning/dashboards/llm.json
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Logging ───────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  promtail:
    # 2.9.0's bundled docker client is incompatible with newer Docker Desktop
    # daemons (requires API >= 1.44); 3.0.0 fixes this.
    image: grafana/promtail:3.0.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      loki:
        condition: service_healthy
    # No wget/curl in this image, only bash; use /dev/tcp to hit promtail's
    # own /ready endpoint (same pattern as the eclipse-temurin services,
    # same endpoint used by the Kubernetes DaemonSet's probes).
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9080 && printf 'GET /ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:

