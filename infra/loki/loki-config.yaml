auth_enabled: false  # Local dev - no authentication

server:
  http_listen_port: 3100

# Ingester: receives logs from Promtail and stores in memory before flushing to disk
ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory  # Single instance - no cluster coordination needed
      replication_factor: 1
    final_sleep: 0s

  chunk_idle_period: 5m  # Flush logs to disk after 5 min of inactivity
  chunk_retain_period: 30s

  # Write-Ahead Log: survives process crashes
  wal:
    enabled: true
    dir: /loki/wal

# Schema: defines how logs are indexed and stored
# Choice: boltdb-shipper with filesystem storage - simple, no external dependencies
schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper  # Local index database
      object_store: filesystem  # Store log chunks on disk
      schema: v11  # Latest schema version
      index:
        prefix: index_
        period: 24h  # One index file per day

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    shared_store: filesystem

  filesystem:
    directory: /loki/chunks  # Where actual log data is stored

# Retention: keep logs for 7 days (168 hours)
limits_config:
  reject_old_samples: true  # Reject logs older than 7 days
  reject_old_samples_max_age: 168h
  retention_period: 168h

compactor:
  working_directory: /loki/boltdb-shipper-compactor
  shared_store: filesystem  # Optimize index files in background
  # Actually delete chunks older than retention_period (reject_old_samples alone only blocks ingestion)
  retention_enabled: true
