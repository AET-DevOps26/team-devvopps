services:
  reverse-proxy:
    image: traefik:v3.6.15
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@tum.de"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # One-time job that populates coursedb with initial course data.
  course-seeder:
    image: ghcr.io/aet-devops26/team-devvopps/course-seeder:latest
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: coursedb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # Blocks until coursedb has at least one course seeded.
  wait-for-courses:
    image: postgres:16
    environment:
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
      course-seeder:
        condition: service_started
    entrypoint: sh -c "while ! psql -h postgres -U postgres -d coursedb -c 'SELECT COUNT(*) FROM courses WHERE course_id > 0' 2>/dev/null | grep -q '[1-9]'; do sleep 5; done; echo 'Courses ready'; sleep infinity"
    healthcheck:
      test: ["CMD", "sh", "-c", "psql -h postgres -U postgres -d coursedb -c 'SELECT COUNT(*) FROM courses WHERE course_id > 0' 2>/dev/null | grep -q '[1-9]'"]
      interval: 5s
      timeout: 5s
      retries: 1
      start_period: 360s
    restart: unless-stopped

  user-service:
    image: ghcr.io/aet-devops26/team-devvopps/user-service:latest
    environment:
      DB_HOST: postgres
      DB_NAME: userdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  course-service:
    image: ghcr.io/aet-devops26/team-devvopps/course-service:latest
    environment:
      DB_HOST: postgres
      DB_NAME: coursedb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  roadmap-service:
    image: ghcr.io/aet-devops26/team-devvopps/roadmap-service:latest
    environment:
      DB_HOST: postgres
      DB_NAME: roadmapdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: "8081"
      LLM_SERVICE_HOST: llm-service
      LLM_SERVICE_PORT: "8084"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    image: ghcr.io/aet-devops26/team-devvopps/api-gateway:latest
    environment:
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: "8081"
      COURSE_SERVICE_HOST: course-service
      COURSE_SERVICE_PORT: "8082"
      ROADMAP_SERVICE_HOST: roadmap-service
      ROADMAP_SERVICE_PORT: "8083"
    depends_on:
      - user-service
      - course-service
      - roadmap-service
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=Host(`${SERVER_HOST}`)"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=8080"
      - "traefik.http.routers.api-gateway.entrypoints=websecure"
      - "traefik.http.routers.api-gateway.tls.certresolver=letsencrypt"

  client:
    image: ghcr.io/aet-devops26/team-devvopps/client:latest
    environment:
      - PUBLIC_API_URL=${PUBLIC_API_URL}
    depends_on:
      - api-gateway
      - llm-service
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=Host(`${CLIENT_HOST}`)"
      - "traefik.http.services.client.loadbalancer.server.port=80"
      - "traefik.http.routers.client.entrypoints=websecure"
      - "traefik.http.routers.client.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.client-compress.compress=true"
      - "traefik.http.routers.client.middlewares=client-compress"

  llm-service:
    image: ghcr.io/aet-devops26/team-devvopps/llm-service:latest
    environment:
      - PORT=8084
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:1234/v1/chat/completions}
      - LLM_MODEL=${LLM_MODEL:-gemma-4-e2b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LOGOS_API_KEY=${LOGOS_API_KEY:-}
      - COURSE_SERVICE_HOST=course-service
      - COURSE_SERVICE_PORT=8082
    depends_on:
      - course-service
      - wait-for-courses
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
    driver: local