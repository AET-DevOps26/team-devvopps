# user-service/src/main/resources/application.properties
spring.application.name=user-service
server.port=8081

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:userdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Auth / JWT. The signing key is shared with the api-gateway (which verifies
# tokens) and MUST be overridden in every real environment via JWT_SIGNING_KEY.
app.jwt.signing-key=${JWT_SIGNING_KEY:dev-only-insecure-key-change-me-0123456789}
app.jwt.expiration-seconds=86400
# Secure cookie flag: false locally (HTTP), true in prod (HTTPS) via COOKIE_SECURE.
app.cookie.secure=${COOKIE_SECURE:false}
# Optional admin bootstrap on startup.
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}
