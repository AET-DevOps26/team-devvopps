server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: roadmap-service
          uri: http://localhost:8081
          predicates:
            - Path=/roadmaps/**

        - id: course-service
          uri: http://localhost:8082
          predicates:
            - Path=/courses/**

        - id: user-progress-service
          uri: http://localhost:8083
          predicates:
            - Path=/user/**