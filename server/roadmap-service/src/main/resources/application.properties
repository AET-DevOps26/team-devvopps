# roadmap-service/src/main/resources/application.properties
spring.application.name=roadmap-service
server.port=8083

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:roadmapdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Off by default — without it, ResponseStatusException's reason (e.g. "The AI
# model returned invalid output...") is silently dropped from the response
# body, leaving only a bare "Bad Gateway" with no context. Property moved from
# server.error.* to spring.web.error.* in Spring Boot 4 (ErrorProperties is now
# nested under WebProperties, prefix spring.web) — confirmed against the
# actual spring-boot-autoconfigure 4.0.6 sources, not assumed. Safe here:
# every reason string in this codebase is deliberately user-facing text,
# never a raw exception message or stack trace.
spring.web.error.include-message=always

user.service.host=${USER_SERVICE_HOST:localhost}
user.service.port=${USER_SERVICE_PORT:8081}
llm.service.host=${LLM_SERVICE_HOST:localhost}
llm.service.port=${LLM_SERVICE_PORT:8084}
