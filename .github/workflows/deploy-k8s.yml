name: Deploy to AET Kubernetes Cluster

# Can be triggered manually via workflow_dispatch, or automatically on every push to main.
# concurrency ensures only one deploy runs at a time per branch.
# cancel-in-progress MUST stay false: killing helm mid-upgrade leaves the
# release locked in pending-upgrade, and every later deploy fails with
# "another operation (install/upgrade/rollback) is in progress".
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'team-devvopps' }}
  HELM_RELEASE_NAME: team-devvopps

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Write the kubeconfig from secrets so kubectl and Helm can reach the cluster.
      # Fails early with a clear message if the secret is missing.
      - name: Configure kubectl
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_CONTENT" ]; then
            echo "ERROR: KUBECONFIG secret not configured"
            echo "Please add your kubeconfig to GitHub Secrets as 'KUBECONFIG'"
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          echo "kubectl configured successfully"

      # Validate the Helm chart before attempting a deploy.
      # Catches templating errors and missing required values early.
      # Replication credentials required for PostgreSQL HA setup (streaming replication)
      - name: Lint Helm chart
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'postgres' }}
          # Replication credentials: ensure they're set in GitHub Secrets for production
          POSTGRES_REPLICATION_USER: ${{ secrets.POSTGRES_REPLICATION_USER || 'replication' }}
          POSTGRES_REPLICATION_PASSWORD: ${{ secrets.POSTGRES_REPLICATION_PASSWORD || 'replication' }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER || 'admin' }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD || 'admin' }}
        run: |
          helm lint helm/team-devvopps/ \
            --set postgres.credentials.username="$POSTGRES_USER" \
            --set postgres.credentials.password="$POSTGRES_PASSWORD" \
            --set postgres.replicationUser="$POSTGRES_REPLICATION_USER" \
            --set postgres.replicationPassword="$POSTGRES_REPLICATION_PASSWORD" \
            --set grafana.adminUser="$GRAFANA_ADMIN_USER" \
            --set grafana.adminPassword="$GRAFANA_ADMIN_PASSWORD"

      # Remove pods stuck in Failed/Unknown state that would block the Helm rollout.
      # Also delete the course-seeder job: completed Jobs are immutable, so helm
      # cannot patch it and the whole upgrade fails ("cannot patch course-seeder").
      # Deleting it lets helm recreate it fresh (it checks for existing data anyway).
      - name: Clean up failed deployments
        run: |
          echo "Cleaning up failed and unknown pods..."
          kubectl delete pods -n "$K8S_NAMESPACE" --field-selector=status.phase=Failed 2>/dev/null || true
          kubectl delete pods -n "$K8S_NAMESPACE" --field-selector=status.phase=Unknown 2>/dev/null || true
          kubectl delete job course-seeder -n "$K8S_NAMESPACE" --ignore-not-found
          echo "Cleanup complete"

      # helm upgrade --install: creates the release if it doesn't exist, upgrades if it does.
      # Sensitive values (DB credentials, API keys) are passed at deploy time, not stored in values files.
      # PostgreSQL replication credentials enable primary-replica streaming replication for HA.
      # Grafana credentials from GitHub Secrets ensure secure admin access.
      # --wait blocks until all pods are ready or the timeout is hit (ensures postgres starts).
      - name: Deploy with Helm
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'postgres' }}
          # Replication credentials passed via --set (used for pg_basebackup on replica pods)
          POSTGRES_REPLICATION_USER: ${{ secrets.POSTGRES_REPLICATION_USER || 'replication' }}
          POSTGRES_REPLICATION_PASSWORD: ${{ secrets.POSTGRES_REPLICATION_PASSWORD || 'replication' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LOGOS_API_KEY: ${{ secrets.LOGOS_API_KEY }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER || 'admin' }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD || 'admin' }}
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" helm/team-devvopps/ \
            -f helm/team-devvopps/values-aet.yaml \
            --set postgres.credentials.username="$POSTGRES_USER" \
            --set postgres.credentials.password="$POSTGRES_PASSWORD" \
            --set postgres.replicationUser="$POSTGRES_REPLICATION_USER" \
            --set postgres.replicationPassword="$POSTGRES_REPLICATION_PASSWORD" \
            --set llmService.groqApiKey="$GROQ_API_KEY" \
            --set llmService.logosApiKey="$LOGOS_API_KEY" \
            --set grafana.adminUser="$GRAFANA_ADMIN_USER" \
            --set grafana.adminPassword="$GRAFANA_ADMIN_PASSWORD" \
            -n "$K8S_NAMESPACE" \
            --wait \
            --timeout 5m

      # All images use the :latest tag, so helm upgrade alone does not restart
      # pods when only the image content changed. Force a rollout so every
      # deployment pulls the freshly built image (imagePullPolicy: Always).
      # Each deployment is restarted and waited on by name so a partial
      # failure is reported explicitly instead of hiding behind bulk output.
      - name: Restart deployments to pull latest images
        run: |
          set -euo pipefail
          deployments=$(kubectl get deployments -n "$K8S_NAMESPACE" -o jsonpath='{.items[*].metadata.name}')

          if [ -z "$deployments" ]; then
            echo "No deployments found in namespace $K8S_NAMESPACE"
            exit 0
          fi

          for d in $deployments; do
            echo "Restarting deployment/$d"
            kubectl rollout restart deployment/"$d" -n "$K8S_NAMESPACE"
          done

          failed=0
          for d in $deployments; do
            echo "Waiting for rollout of deployment/$d"
            if ! kubectl rollout status deployment/"$d" -n "$K8S_NAMESPACE" --timeout=5m; then
              echo "::error::Rollout failed for deployment/$d"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more deployments failed to roll out"
            exit 1
          fi

      # DaemonSets (e.g. promtail) are not covered by the Deployment restart loop above.
      # Without this, DaemonSet pods keep running with whatever resource limits they
      # started with, even after values.yaml/template changes are deployed via helm upgrade.
      - name: Restart daemonsets to pull latest images
        run: |
          set -euo pipefail
          daemonsets=$(kubectl get daemonsets -n "$K8S_NAMESPACE" -o jsonpath='{.items[*].metadata.name}')

          if [ -z "$daemonsets" ]; then
            echo "No daemonsets found in namespace $K8S_NAMESPACE"
            exit 0
          fi

          for ds in $daemonsets; do
            echo "Restarting daemonset/$ds"
            kubectl rollout restart daemonset/"$ds" -n "$K8S_NAMESPACE"
          done

          failed=0
          for ds in $daemonsets; do
            echo "Waiting for rollout of daemonset/$ds"
            if ! kubectl rollout status daemonset/"$ds" -n "$K8S_NAMESPACE" --timeout=5m; then
              echo "::error::Rollout failed for daemonset/$ds"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more daemonsets failed to roll out"
            exit 1
          fi

      # Quick sanity check — prints pod/service/ingress state immediately after deploy.
      - name: Verify deployment
        run: |
          echo "Checking pod status..."
          kubectl get pods -n "$K8S_NAMESPACE"
          kubectl get services -n "$K8S_NAMESPACE"
          kubectl get ingress -n "$K8S_NAMESPACE" || echo "No ingress configured yet"

          echo ""
          echo "Release status:"
          helm status "$HELM_RELEASE_NAME" -n "$K8S_NAMESPACE"

      # Exclude the course-seeder job from readiness check (it is a one-off job
      # that runs to completion and exits, so it will never reach Ready state).
      - name: Wait for pods to be ready
        run: |
          echo "Waiting for deployment pods to be ready..."
          kubectl wait --for=condition=ready pod \
            --selector='job-name!=course-seeder' \
            -n "$K8S_NAMESPACE" \
            --timeout=5m

      - name: Deployment Success
        run: |
          echo "Deployment successful!"
          echo ""
          echo "Release: $HELM_RELEASE_NAME"
          echo "Namespace: $K8S_NAMESPACE"
          echo ""
          echo "Pod Status:"
          kubectl get pods -n "$K8S_NAMESPACE"
          echo ""
          echo "Next steps:"
          echo "1. Check ingress: kubectl get ingress -n $K8S_NAMESPACE"
          echo "2. View logs: kubectl logs -n $K8S_NAMESPACE -l app=<service>"
          echo "3. Port forward (if needed): kubectl port-forward -n $K8S_NAMESPACE svc/<service> <local>:<remote>"
