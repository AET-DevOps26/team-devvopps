name: Lint Code

# Runs on PRs to main and on any branch push except main.
# Acts as a quality gate before code is merged.
on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  # Lints the React frontend using ESLint.
  lint-client:
    name: Lint React Client (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install
        working-directory: client

      - name: Run ESLint
        run: npm run lint
        working-directory: client

  # Lints all Java services using SpotBugs via Gradle.
  # -x test skips unit tests; --scan uploads a build scan for inspection.
  lint-java:
    name: Lint Java Services (SpotBugs)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Run SpotBugs
        run: ./gradlew check -x test --scan
        working-directory: server
  
  # Lints the Python LLM service using Ruff.
  lint-python:
    name: Lint Python LLM Service (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check .
        working-directory: server/llm-service

  # Validates GitHub Actions workflow files themselves for correctness.
  # Catches common mistakes like invalid expressions or missing required fields.
  lint-actions:
    name: Lint GitHub Actions Workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: devops-actions/actionlint@9fb9c192862f19e684586ca84b500461bcd8a541 # v0.1.12

  # Validates the Helm chart template rendering and value schema.
  # Uses dummy credentials so required secret values don't block CI.
  lint-helm:
    name: Lint Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
        with:
          version: 'latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Helm chart
        run: |
          helm lint "helm/team-devvopps/" \
            --set "postgres.credentials.username=testuser" \
            --set "postgres.credentials.password=testpass123"
  
  lint-openapi:
    name: Lint OpenAPI Specs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Lint OpenAPI files
        run: |
          for file in api/*.yaml
          do
            echo "Linting $file"
            redocly lint "$file"
          done
