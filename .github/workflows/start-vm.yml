name: Start VM (Azure)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  start:
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Start VM
        run: |
          az vm start \
            --resource-group team-devvopps \
            --name team-devvopps-vm