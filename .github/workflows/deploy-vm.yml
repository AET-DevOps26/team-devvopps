name: Deploy to VM

# Runs automatically after the Build workflow completes successfully on main.
# Copies the compose file to the Azure VM and restarts all services via Docker Compose.
on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build Docker Images
    types:
      - completed
    branches:
      - main
  
      
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      
      # --- SSH access setup -------------------------------------------------
      # The VM's NSG only allows SSH (port 22) from the MWN/eduVPN range
      # (129.187.0.0/16) by default, to keep it closed to the public internet.
      # GitHub-hosted runners get an IP from GitHub's own pool, which is not 
      # in that range, so without this step, every SSH/SCP action below would 
      # time out. We temporarily open SSH for just the runner's IP, scoped to 
      # a /32 (a single address), and remove the rule again at the end of the
      # job (see "Remove temporary CI rule"), even if the job fails.

      - name: Azure login
        # Required before any 'az' CLI command can manage Azure resources.
        # Uses the same service principle already used for Terraform/provisioning.
        # That principal needs "Network Contributor" on the NSG. 
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Get runner IP
        # Determines the public IP this specific runner instance is using, 
        # so we can grant access to exactly that address (not a broader range)
        id: ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Allow runner IP in NSG
        # Adds a narrow, temporary inbound rule:
        #   - /32 = this single IP only
        #   - priority 101 = evaluated just after the standing MWN-only rule (priority 100)
        #   - destination port 22 = SSH only, nothing else is opened
        # This rule is the only thing that lets this job reach the VM over SSH
        run: |
          az network nsg rule create \
            --resource-group team-devvopps \
            --nsg-name team-devvopps-nsg \
            --name allow-ssh-ci-temp \
            --priority 101 \
            --access Allow \
            --protocol Tcp \
            --direction Inbound \
            --source-address-prefixes ${{ steps.ip.outputs.ip }}/32 \
            --destination-port-ranges 22

      
      # --- Deployment steps (now that SSH access is open for this runner) ---


      # Copy the Docker Compose file and database init script to the VM.
      # These are the only files needed on the VM; images are pulled from GHCR.
      # Must run after the NSG rule above, since this connects to SSH.
      - name: Copy Files to VM
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ vars.AZURE_PUBLIC_IP }}
          username: ${{ vars.AZURE_USER }}
          key: ${{ secrets.AZURE_PRIVATE_KEY }}
          source: "compose.azure.yml,server/init-databases.sql"
          target: /home/${{ vars.AZURE_USER }}

      # Write a .env.prod file on the VM with hostnames derived from the public IP.
      # nip.io provides free wildcard DNS so we don't need a custom domain.
      - name: SSH to VM and Create .env.prod
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ vars.AZURE_PUBLIC_IP }}
          username: ${{ vars.AZURE_USER }}
          key: ${{ secrets.AZURE_PRIVATE_KEY }}
          script: |
            rm -f .env.prod
            touch .env.prod
            echo "CLIENT_HOST=client.${{ vars.AZURE_PUBLIC_IP }}.nip.io" >> .env.prod
            echo "SERVER_HOST=api.${{ vars.AZURE_PUBLIC_IP }}.nip.io" >> .env.prod
            echo "PUBLIC_API_URL=https://api.${{ vars.AZURE_PUBLIC_IP }}.nip.io" >> .env.prod

      # Pull the latest images from GHCR and restart all services.
      - name: SSH to VM and Execute Docker-Compose Up
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ vars.AZURE_PUBLIC_IP }}
          username: ${{ vars.AZURE_USER }}
          key: ${{ secrets.AZURE_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f compose.azure.yml --env-file=.env.prod up --pull=always -d
      

      # --- Cleanup ------------------------------------------------------------
      
      - name: Remove temporary CI rule
        # `if: always()` ensures that this runs even if an earlier step fails,
        # so a failed deploy never leaves an open SSH rule behind.
        if: always()
        run: |
          az network nsg rule delete \
            --resource-group team-devvopps \
            --nsg-name team-devvopps-nsg \
            --name allow-ssh-ci-temp
